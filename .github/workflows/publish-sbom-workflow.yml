name: Publish SBOM workflow

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: Release tag to put in the generated workflow (for example, v2.7)
        required: true
        type: string
      environment:
        description: Environment whose S3 bucket receives the workflow
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish workflow to ${{ github.event_name == 'workflow_dispatch' && inputs.environment }} S3
    runs-on: ubuntu-latest
    # Published prereleases go to dev and normal releases go to prod.
    # A manual run uses the explicitly selected Environment.
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment }}
    env:
      DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment }}
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2'}}
      S3_KEY: ${{ vars.SBOM_WORKFLOW_S3_KEY || 'sbom-workflow/sbom.yml' }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@v5

      - name: Generate versioned workflow
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG"
            exit 1
          fi
          sed "s/{{version}}/${RELEASE_TAG}/g" \
            .github/templates/sbom-generation.yml.tpl > sbom-generation.yml
          grep -q "@${RELEASE_TAG}" sbom-generation.yml
          if grep -q '{{version}}' sbom-generation.yml; then
            echo 'Version placeholder was not fully replaced'
            exit 1
          fi

      - name: Display generated workflow
        run: cat sbom-generation.yml

      - name: Select S3 bucket
        shell: bash
        run: |
          if [ "$DEPLOY_ENV" = "dev" ]; then
            selected_s3_name=${{ secrets.DEV_S3_NAME }}
          elif [ "$DEPLOY_ENV" = "prod" ]; then
            selected_s3_name=${{ secrets.PROD_S3_NAME }}
          else
            echo "Unsupported environment: $DEPLOY_ENV"
            exit 1
          fi

          if [ -z "$selected_s3_name" ]; then
            echo "${DEPLOY_ENV} S3 bucket variable is not configured"
            exit 1
          fi

          echo "S3_NAME=$selected_s3_name" >> "$GITHUB_ENV"
          echo "Selected $DEPLOY_ENV S3 bucket: $selected_s3_name"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update workflow in S3
        run: |
          echo "Uploading $DEPLOY_ENV workflow to s3://$S3_NAME/$S3_KEY"
          aws s3 cp sbom-generation.yml "s3://$S3_NAME/$S3_KEY" \
            --content-type application/yaml
