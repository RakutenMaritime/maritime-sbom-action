name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  generate-tests:
    name: generate action tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run generate test suite
        run: generate/tests/run-tests.sh

  upload-tests:
    name: upload action tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run upload test suite
        run: upload/tests/run-tests.sh

  self-test:
    name: Self-test actions on this repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM
        id: sbom
        uses: ./generate
        with:
          output-file: sbom.json

      - name: Display SBOM
        run: cat ${{ steps.sbom.outputs.sbom-file }}

      - name: Upload SBOM
        uses: ./upload
        with:
          sbom-file: ${{ steps.sbom.outputs.sbom-file }}
          api-url: ''   # skip upload in CI self-test

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: ${{ steps.sbom.outputs.sbom-file }}
