name: 'Rakuten SBOM Generate'
description: 'Scan project dependencies with cdxgen and produce a plain JSON SBOM'
author: 'Rakuten Symphony'

inputs:
  scan-path:
    description: 'Path to scan for dependencies'
    required: false
    default: '.'
  output-file:
    description: 'Output file path for the SBOM'
    required: false
    default: 'sbom.json'
  recurse:
    description: 'Recurse into subdirectories (mono-repos). Set to false to scan only the top level.'
    required: false
    default: 'true'

outputs:
  sbom-file:
    description: 'Path to the generated SBOM file'

runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.scan-path }}
    - ${{ inputs.output-file }}
    - ${{ inputs.recurse }}
