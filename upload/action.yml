name: 'Rakuten SBOM Upload'
description: 'POST a generated SBOM file to an API endpoint (X-Api-Key auth)'
author: 'Rakuten Symphony'

inputs:
  sbom-file:
    description: 'Path to the SBOM file to upload'
    required: false
    default: 'sbom.json'
  api-url:
    description: 'API endpoint to POST the SBOM to. If empty, upload is skipped.'
    required: false
    default: ''
  api-key:
    description: 'API key sent as the X-Api-Key header'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - shell: bash
      env:
        SBOM_FILE: ${{ inputs.sbom-file }}
        API_URL: ${{ inputs.api-url }}
        API_KEY: ${{ inputs.api-key }}
      run: ${{ github.action_path }}/upload.sh
